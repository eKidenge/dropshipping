{% extends 'base.html' %}
{% block title %}Page Not Found - QINEX KENYA{% endblock %}

{% block content %}
<style>
    .error-container {
        min-height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }
    .error-content {
        text-align: center;
        max-width: 600px;
    }
    .error-code {
        font-size: 8rem;
        font-weight: 800;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
        margin-bottom: 20px;
    }
    .error-title {
        font-size: 2rem;
        color: #333;
        margin-bottom: 15px;
    }
    .error-message {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 30px;
        line-height: 1.6;
    }
    .error-actions {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
    }
    .btn {
        padding: 12px 30px;
        border-radius: 5px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }
    .btn-secondary {
        background: #f8f9fa;
        color: #667eea;
        border: 2px solid #667eea;
    }
    .btn-secondary:hover {
        background: #667eea;
        color: white;
    }
    .search-box {
        margin: 30px auto 0;
        max-width: 400px;
        position: relative;
    }
    .search-box input {
        width: 100%;
        padding: 15px 20px;
        padding-right: 60px;
        border: 2px solid #eee;
        border-radius: 50px;
        font-size: 16px;
        transition: all 0.3s ease;
    }
    .search-box input:focus {
        border-color: #667eea;
        outline: none;
    }
    .search-box button {
        position: absolute;
        right: 5px;
        top: 5px;
        padding: 10px 25px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
    }
    @media (max-width: 768px) {
        .error-code {
            font-size: 6rem;
        }
        .error-title {
            font-size: 1.5rem;
        }
    }
</style>

<div class="error-container">
    <div class="error-content">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved. 
            Let's get you back on track.
        </p>
        
        <div class="error-actions">
            <a href="{% url 'store:home' %}" class="btn btn-primary">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="{% url 'store:products' %}" class="btn btn-secondary">
                <i class="fas fa-store"></i> Continue Shopping
            </a>
        </div>
        
        <div class="search-box">
            <form action="{% url 'store:search' %}" method="GET">
                <input type="text" name="q" placeholder="Search products..." autocomplete="off">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
