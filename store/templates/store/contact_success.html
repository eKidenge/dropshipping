{% extends 'store/base.html' %}
{% block title %}Message Sent - QINEX KENYA{% endblock %}

{% block content %}
<style>
    .success-container {
        max-width: 600px;
        margin: 60px auto;
        padding: 40px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        text-align: center;
    }
    .success-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 30px;
    }
    .success-icon i {
        font-size: 40px;
        color: white;
    }
    .success-container h1 {
        color: #333;
        margin-bottom: 15px;
        font-size: 2rem;
    }
    .success-container p {
        color: #666;
        margin-bottom: 30px;
        line-height: 1.6;
    }
    .btn {
        padding: 12px 30px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
    }
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }
    .btn-secondary {
        background: #6c757d;
        color: white;
        margin-left: 10px;
    }
    .btn-secondary:hover {
        background: #5a6268;
    }
</style>

<div class="success-container">
    <div class="success-icon">
        <i class="fas fa-check"></i>
    </div>
    <h1>Message Sent Successfully!</h1>
    <p>Thank you for contacting us. We've received your message and will get back to you within 24 hours.</p>
    <a href="{% url 'store:home' %}" class="btn btn-primary">Return to Home</a>
    <a href="{% url 'store:products' %}" class="btn btn-secondary">Continue Shopping</a>
</div>
{% endblock %}
