{% extends 'store/base.html' %}
{% block title %}Edit Address - QINEX KENYA{% endblock %}

{% block content %}
<style>
    .address-form-container {
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    .address-form-container h1 {
        color: #333;
        margin-bottom: 30px;
        text-align: center;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-weight: 500;
    }
    .form-group input, .form-group select, .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
        border-color: #667eea;
        outline: none;
        box-shadow: 0 0 5px rgba(102,126,234,0.3);
    }
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }
    .btn {
        padding: 12px 30px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }
    .btn-secondary {
        background: #6c757d;
        color: white;
        margin-left: 10px;
    }
    .btn-secondary:hover {
        background: #5a6268;
    }
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .checkbox-group input {
        width: auto;
    }
</style>

<div class="address-form-container">
    <h1>Edit Address</h1>
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ address.first_name }}" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ address.last_name }}" required>
            </div>
        </div>
        
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" value="{{ address.phone }}" required>
        </div>
        
        <div class="form-group">
            <label>Address Line 1</label>
            <input type="text" name="address" value="{{ address.address }}" required>
        </div>
        
        <div class="form-group">
            <label>Address Line 2</label>
            <input type="text" name="address2" value="{{ address.address2 }}">
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" value="{{ address.city }}" required>
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" name="state" value="{{ address.state }}" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>ZIP Code</label>
                <input type="text" name="zipcode" value="{{ address.zipcode }}" required>
            </div>
            <div class="form-group">
                <label>Country</label>
                <select name="country" required>
                    <option value="KE" {% if address.country == 'KE' %}selected{% endif %}>Kenya</option>
                    <option value="UG" {% if address.country == 'UG' %}selected{% endif %}>Uganda</option>
                    <option value="TZ" {% if address.country == 'TZ' %}selected{% endif %}>Tanzania</option>
                    <option value="RW" {% if address.country == 'RW' %}selected{% endif %}>Rwanda</option>
                </select>
            </div>
        </div>
        
        <div class="form-group checkbox-group">
            <input type="checkbox" name="is_default" id="isDefault" {% if address.is_default %}checked{% endif %}>
            <label for="isDefault">Set as default address</label>
        </div>
        
        <button type="submit" class="btn btn-primary">Update Address</button>
        <a href="{% url 'store:address_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
